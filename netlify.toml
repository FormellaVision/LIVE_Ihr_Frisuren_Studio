# www -> non-www canonical redirect (must stay first)
[[redirects]]
  from = "https://www.ihr-frisuren-studio.de/*"
  to = "https://ihr-frisuren-studio.de/:splat"
  status = 301
  force = true

# Legacy URL redirects (old site -> new site)
[[redirects]]
  from = "/faq"
  to = "/friseur-hamburg-hamm"
  status = 301
  force = true

[[redirects]]
  from = "/philosophie"
  to = "/ueber-uns"
  status = 301
  force = true

[build]
command = "npx next build"
publish = ".next"

[[plugins]]
package = "@netlify/plugin-nextjs"

[context.deploy-preview]
[[context.deploy-preview.headers]]
  for = "/*"
  [context.deploy-preview.headers.values]
    X-Robots-Tag = "noindex, nofollow"

[context.branch-deploy]
[[context.branch-deploy.headers]]
  for = "/*"
  [context.branch-deploy.headers.values]
    X-Robots-Tag = "noindex, nofollow"
