# www -> non-www canonical redirect (must stay first)
[[redirects]]
  from = "https://www.ihr-frisuren-studio.de/*"
  to = "https://ihr-frisuren-studio.de/:splat"
  status = 301
  force = true

# ------------------------------------------------------------
# 404 Cleanup Redirects (legacy URLs that currently return 404)
# ------------------------------------------------------------

# Old English URLs (no EN version now) -> map to closest DE equivalents
[[redirects]]
  from = "/en/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/en/ueber-uns"
  to = "/ueber-uns"
  status = 301
  force = true

[[redirects]]
  from = "/en/philosophie"
  to = "/ueber-uns"
  status = 301
  force = true

[[redirects]]
  from = "/en/faq"
  to = "/friseur-hamburg-hamm"
  status = 301
  force = true

[[redirects]]
  from = "/en/herrenfriseur-hamburg-hamm"
  to = "/herrenfriseur-hamburg-hamm"
  status = 301
  force = true

# Fallback for any other /en/* URLs -> drop /en and keep path (safe fallback)
[[redirects]]
  from = "/en/*"
  to = "/:splat"
  status = 301
  force = true

